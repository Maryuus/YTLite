name: Build YouTube Plus IPA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Tous les lundis à 6h

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pyzule
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install git+https://github.com/asdfzxcvbn/pyzule-rw.git
          echo "PATH=$PWD/venv/bin:$PATH" >> $GITHUB_ENV

      - name: Download latest YouTube IPA
        run: |
          curl -L "https://armconverter.com/decryptedappstore/download?bundleId=com.google.ios.youtube" \
            -o YouTube.ipa || true
          # Fallback via ipadown
          if [ ! -f YouTube.ipa ] || [ ! -s YouTube.ipa ]; then
            pip3 install ipatool
            ipatool download -b com.google.ios.youtube -o YouTube.ipa
          fi

      - name: Get latest YTLite deb
        run: |
          gh release download --repo dayanch96/YTLite --pattern "*arm64e*" --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject tweak into IPA
        run: |
          source venv/bin/activate
          python3 -c "import pyzule_rw; print(dir(pyzule_rw))"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "auto-${{ github.run_number }}"
          name: "YouTube Plus (auto-build)"
          files: YouTubePlus.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
