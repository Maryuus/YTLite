name: Build YouTube Plus IPA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup and build
        run: |
          # Install pyzule
          brew install python@3.11 || true
          /opt/homebrew/bin/pip3.11 install git+https://github.com/asdfzxcvbn/pyzule-rw.git --break-system-packages

          # Download YouTube IPA
          curl -L "https://armconverter.com/decryptedappstore/download?bundleId=com.google.ios.youtube" -o YouTube.ipa

          # Download latest YTLite deb
          gh release download --repo dayanch96/YTLite --pattern "*arm64e*" --dir .

          # Inject tweak
          /opt/homebrew/bin/pyzule -i YouTube.ipa -o YouTubePlus.ipa -f *.deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "auto-${{ github.run_number }}"
          name: "YouTube Plus (auto-build)"
          files: YouTubePlus.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
